name: Release

run-name: Release ${{ inputs.tag }}

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Semantic version tag (for example, v1.2.3)
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  validate:
    name: Run CI
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  publish:
    name: Publish GitHub release
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Require the main branch
        run: test "$GITHUB_REF" = refs/heads/main

      - name: Validate the release tag
        env:
          TAG: ${{ inputs.tag }}
        run: |
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must use the vMAJOR.MINOR.PATCH format."
            exit 1
          fi

      - name: Create the tag and GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: gh release create "$TAG" --target "$GITHUB_SHA" --generate-notes --fail-on-no-commits
